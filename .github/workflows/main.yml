name: cairo-msvc-final-stable

on: 
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: windows-latest

    env:
      PREFIX: ${{ github.workspace }}\prefix
      BUILD_TYPE: ${{ github.event.inputs.build_type }}
      
      # Meson needs lowercase
      MESON_BUILD_TYPE: ${{ github.event.inputs.build_type == 'Release' && 'release' || 'debug' }}

      PKG_CONFIG_PATH: ${{ github.workspace }}\prefix\lib\pkgconfig

      # pinned versions (stability core)
      CAIRO_VERSION: 1.18.0
      PIXMAN_VERSION: pixman-0.42.2
      FREETYPE_VERSION: VER-2-13-2
      HARFBUZZ_VERSION: 8.3.0
      FONTCONFIG_VERSION: 2.15.0
      EXPAT_VERSION: R_2_6_2

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install tools
        run: |
          choco install ninja pkgconfiglite -y
          pip install meson

      ########################################
      # CRT mapping (key stability point)
      ########################################

      - name: Setup MSVC CRT
        shell: bash
        run: |
          if [ "${{ env.BUILD_TYPE }}" = "Debug" ]; then
            echo "MSVC_CRT=MultiThreadedDebug" >> $GITHUB_ENV
          else
            echo "MSVC_CRT=MultiThreaded" >> $GITHUB_ENV
          fi

      ########################################
      # Clone all deps (pinned)
      ########################################

      - name: Clone dependencies
        shell: bash
        run: |
          git clone https://github.com/madler/zlib
          git clone https://github.com/glennrp/libpng

          git clone https://gitlab.freedesktop.org/pixman/pixman.git
          cd pixman && git checkout $PIXMAN_VERSION && cd ..

          git clone https://gitlab.freedesktop.org/freetype/freetype.git
          cd freetype && git checkout $FREETYPE_VERSION && cd ..

          git clone https://github.com/harfbuzz/harfbuzz.git
          cd harfbuzz && git checkout $HARFBUZZ_VERSION && cd ..

          git clone https://gitlab.freedesktop.org/fontconfig/fontconfig.git
          cd fontconfig && git checkout $FONTCONFIG_VERSION && cd ..

          git clone https://github.com/libexpat/libexpat.git
          cd libexpat && git checkout $EXPAT_VERSION && cd ..

          git clone https://gitlab.freedesktop.org/cairo/cairo.git
          cd cairo && git checkout $CAIRO_VERSION && cd ..

      ########################################
      # zlib
      ########################################

      - name: Build zlib
        shell: cmd
        run: |
          cmake -S zlib -B build-zlib ^
            -G Ninja ^
            -DCMAKE_INSTALL_PREFIX=%PREFIX% ^
            -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
            -DBUILD_SHARED_LIBS=OFF ^
            -DCMAKE_MSVC_RUNTIME_LIBRARY=%MSVC_CRT%
          cmake --build build-zlib
          cmake --install build-zlib

      ########################################
      # libpng
      ########################################

      - name: Build libpng
        shell: cmd
        run: |
          cmake -S libpng -B build-libpng ^
            -G Ninja ^
            -DCMAKE_INSTALL_PREFIX=%PREFIX% ^
            -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
            -DPNG_SHARED=OFF ^
            -DPNG_STATIC=ON ^
            -DZLIB_ROOT=%PREFIX% ^
            -DCMAKE_MSVC_RUNTIME_LIBRARY=%MSVC_CRT%
          cmake --build build-libpng
          cmake --install build-libpng

      ########################################
      # expat
      ########################################

      - name: Build expat
        shell: cmd
        run: |
          cmake -S libexpat/expat -B build-expat ^
            -G Ninja ^
            -DCMAKE_INSTALL_PREFIX=%PREFIX% ^
            -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
            -DBUILD_SHARED_LIBS=OFF ^
            -DCMAKE_MSVC_RUNTIME_LIBRARY=%MSVC_CRT%
          cmake --build build-expat
          cmake --install build-expat

      ########################################
      # pixman
      ########################################

      - name: Build pixman
        shell: cmd
        run: |
          meson setup build-pixman pixman ^
            --default-library=static ^
            --prefix=%PREFIX% ^
            --buildtype=%MESON_BUILD_TYPE% ^
            -Db_vscrt=mt ^
            -Dtests=disabled
          ninja -C build-pixman
          ninja -C build-pixman install

      ########################################
      # freetype
      ########################################

      - name: Build freetype
        shell: cmd
        run: |
          cmake -S freetype -B build-freetype ^
            -G Ninja ^
            -DCMAKE_INSTALL_PREFIX=%PREFIX% ^
            -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
            -DBUILD_SHARED_LIBS=OFF ^
            -DFT_WITH_ZLIB=ON ^
            -DFT_WITH_PNG=ON ^
            -DZLIB_ROOT=%PREFIX% ^
            -DCMAKE_MSVC_RUNTIME_LIBRARY=%MSVC_CRT%
          cmake --build build-freetype
          cmake --install build-freetype

      ########################################
      # fontconfig (fixed expat dependency)
      ########################################

      - name: Build fontconfig
        shell: cmd
        run: |
          meson setup build-fontconfig fontconfig ^
            --default-library=static ^
            --prefix=%PREFIX% ^
            --buildtype=%MESON_BUILD_TYPE% ^
            -Db_vscrt=mt ^
            -Dtests=disabled ^
            -Dwrap_mode=nofallback ^
            -Dexpat=enabled ^
            -Ddoc=disabled ^
            -Dcache-build=disabled
          ninja -C build-fontconfig
          ninja -C build-fontconfig install

      ########################################
      # harfbuzz
      ########################################

      - name: Build harfbuzz
        shell: cmd
        run: |
          meson setup build-harfbuzz harfbuzz ^
            --default-library=static ^
            --prefix=%PREFIX% ^
            --buildtype=%MESON_BUILD_TYPE% ^
            -Db_vscrt=mt ^
            -Dtests=disabled ^
            -Dfreetype=enabled
          ninja -C build-harfbuzz
          ninja -C build-harfbuzz install

      ########################################
      # cairo final
      ########################################

      - name: Build cairo
        shell: cmd
        run: |
          meson setup build-cairo cairo ^
            --default-library=static ^
            --prefix=%PREFIX% ^
            --buildtype=%MESON_BUILD_TYPE% ^
            -Db_vscrt=mt ^
            -Dfontconfig=enabled ^
            -Dfreetype=enabled ^
            -Dpng=enabled ^
            -Dzlib=enabled ^
            -Dharfbuzz=enabled ^
            -Dxlib=disabled ^
            -Dxcb=disabled ^
            -Dtests=disabled ^
            -Ddocs=disabled
          ninja -C build-cairo
          ninja -C build-cairo install

      ########################################
      # Create test demo
      ########################################

      - name: Create test file
        shell: bash
        run: |
          cat > demo.c << 'EOF'
          #include <cairo.h>
          #include <stdio.h>

          int main() {
              cairo_surface_t *surface;
              cairo_t *cr;

              surface = cairo_image_surface_create(CAIRO_FORMAT_ARGB32, 200, 200);
              cr = cairo_create(surface);

              // Draw a red rectangle
              cairo_set_source_rgb(cr, 1.0, 0.0, 0.0);
              cairo_rectangle(cr, 50, 50, 100, 100);
              cairo_fill(cr);

              // Save to PNG
              cairo_status_t status = cairo_surface_write_to_png(surface, "test.png");
              if (status != CAIRO_STATUS_SUCCESS) {
                  printf("Error saving PNG: %s\n", cairo_status_to_string(status));
                  return 1;
              }

              printf("Test image created successfully!\n");

              cairo_destroy(cr);
              cairo_surface_destroy(surface);
              return 0;
          }
          EOF

      - name: Compile demo
        shell: cmd
        run: |
          cl demo.c ^
            /I "%PREFIX%\include\cairo" ^
            /I "%PREFIX%\include" ^
            /I "%PREFIX%\include\freetype2" ^
            /link /LIBPATH:"%PREFIX%\lib" ^
            cairo.lib freetype.lib fontconfig.lib harfbuzz.lib ^
            expat.lib libpng16.lib zlib.lib pixman-1.lib ^
            gdi32.lib user32.lib ole32.lib oleaut32.lib uuid.lib ^
            /OUT:demo.exe

      - name: Run demo
        shell: cmd
        run: |
          demo.exe

      - name: Upload demo
        uses: actions/upload-artifact@v4
        with:
          name: cairo-demo-${{ env.BUILD_TYPE }}
          path: |
            demo.exe
            test.png

      ########################################
      # package
      ########################################

      - name: Package
        shell: bash
        run: |
          tar -czf cairo-msvc-${BUILD_TYPE}.tar.gz -C prefix .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: cairo-msvc-final-${{ env.BUILD_TYPE }}
          path: cairo-msvc-${BUILD_TYPE}.tar.gz
