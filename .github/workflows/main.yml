name: build-cairo-msvc

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build:
    runs-on: windows-latest

    env:
      PREFIX: ${{ github.workspace }}\prefix
      BUILD_TYPE: ${{ github.event.inputs.build_type }}
      MESON_BUILD_TYPE: ${{ github.event.inputs.build_type == 'Release' && 'release' || 'debug' }}
      PKG_CONFIG_PATH: ${{ github.workspace }}\prefix\lib\pkgconfig

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install build tools
        run: |
          choco install ninja pkgconfiglite -y
          pip install meson

      - name: Clone dependencies
        run: |
          git clone https://github.com/madler/zlib
          git clone https://github.com/glennrp/libpng
          git clone https://gitlab.freedesktop.org/pixman/pixman.git
          git clone https://gitlab.freedesktop.org/freetype/freetype.git
          git clone https://gitlab.freedesktop.org/cairo/cairo.git

      ################################
      # zlib
      ################################

      - name: Build zlib
        shell: cmd
        run: |
          cmake -S zlib -B build-zlib ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
            -DCMAKE_INSTALL_PREFIX=%PREFIX% ^
            -DBUILD_SHARED_LIBS=OFF ^
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build build-zlib --config %BUILD_TYPE%
          cmake --install build-zlib

      ################################
      # libpng
      ################################

      - name: Build libpng
        shell: cmd
        run: |
          cmake -S libpng -B build-libpng ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
            -DCMAKE_INSTALL_PREFIX=%PREFIX% ^
            -DPNG_SHARED=OFF ^
            -DPNG_STATIC=ON ^
            -DZLIB_ROOT=%PREFIX% ^
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build build-libpng --config %BUILD_TYPE%
          cmake --install build-libpng

      ################################
      # pixman
      ################################

      - name: Build pixman
        shell: cmd
        run: |
          meson setup build-pixman pixman ^
            --default-library=static ^
            --prefix=%PREFIX% ^
            --buildtype=%MESON_BUILD_TYPE% ^
            -Db_vscrt=mt ^
            -Dtests=disabled
          ninja -C build-pixman
          ninja -C build-pixman install

      ################################
      # freetype
      ################################

      - name: Build freetype
        shell: cmd
        run: |
          cmake -S freetype -B build-freetype ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
            -DCMAKE_INSTALL_PREFIX=%PREFIX% ^
            -DBUILD_SHARED_LIBS=OFF ^
            -DFT_WITH_ZLIB=ON ^
            -DFT_WITH_PNG=ON ^
            -DZLIB_ROOT=%PREFIX% ^
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build build-freetype --config %BUILD_TYPE%
          cmake --install build-freetype

      ################################
      # cairo
      ################################

      - name: Build cairo
        shell: cmd
        run: |
          meson setup build-cairo cairo ^
            --default-library=static ^
            --prefix=%PREFIX% ^
            --buildtype=%MESON_BUILD_TYPE% ^
            -Db_vscrt=mt ^
            -Dfontconfig=disabled ^
            -Dxlib=disabled ^
            -Dxcb=disabled ^
            -Dtests=disabled
          ninja -C build-cairo
          ninja -C build-cairo install

      ################################
      # Package
      ################################

      - name: Package artifact
        shell: bash
        run: |
          tar -czf cairo-msvc-${BUILD_TYPE}.tar.gz prefix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cairo-msvc-${{ env.BUILD_TYPE }}
          path: cairo-msvc-${{ env.BUILD_TYPE }}.tar.gz
